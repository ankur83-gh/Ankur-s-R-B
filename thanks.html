<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — ANKUR</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --accent: #3B82F6;
    --accent-light: #93C5FD;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  /* ---------- Confetti ---------- */
  .confetti-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 10;
  }

  .confetti-piece {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 14px;
    opacity: 0.9;
    animation-name: confettiFall;
    animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1);
    animation-fill-mode: forwards;
  }

  @keyframes confettiFall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(105vh) rotate(540deg);
      opacity: 0;
    }
  }

  /* ---------- Content ---------- */
  .confirm-wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .confirm-card {
    max-width: 460px;
    width: 100%;
    text-align: center;
  }

  .check-circle {
    width: 96px;
    height: 96px;
    margin: 0 auto 32px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 32px rgba(59, 130, 246, 0.35);
    opacity: 0;
    transform: scale(0.5);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
  }

  @keyframes popIn {
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  .check-circle svg {
    width: 48px;
    height: 48px;
  }

  .check-circle path {
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: drawCheck 0.5s ease 0.55s forwards;
  }

  @keyframes drawCheck {
    to {
      stroke-dashoffset: 0;
    }
  }

  .confirm-headline {
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.35s forwards;
  }

  .confirm-body {
    font-size: 16px;
    color: #666;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.5s forwards;
  }

  .confirm-actions {
    opacity: 0;
    animation: fadeUp 0.6s ease 0.65s forwards;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(14px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    padding: 14px 32px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
    background: #2f6fe0;
  }
</style>
</head>
<body>

  <div class="confetti-layer" id="confettiLayer"></div>

  <div class="confirm-wrap">
    <div class="confirm-card">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12.5l5 5L20 6.5"></path>
        </svg>
      </div>
      <h1 class="confirm-headline">Order Confirmed!</h1>
      <p class="confirm-body">Thank you for supporting Ankur. Your order is on its way.</p>
      <div class="confirm-actions">
        <a href="index.html" class="btn-primary">Back to Site</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const layer = document.getElementById('confettiLayer');
      const colors = ['#3B82F6', '#93C5FD', '#1A1A1A', '#BFDBFE'];
      const pieceCount = 80;

      for (let i = 0; i < pieceCount; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';

        const left = Math.random() * 100;
        const duration = 2.5 + Math.random() * 2;
        const delay = Math.random() * 0.6;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const size = 6 + Math.random() * 6;
        const isCircle = Math.random() > 0.5;

        piece.style.left = left + 'vw';
        piece.style.width = size + 'px';
        piece.style.height = (isCircle ? size : size * 1.8) + 'px';
        piece.style.background = color;
        piece.style.borderRadius = isCircle ? '50%' : '2px';
        piece.style.animationDuration = duration + 's';
        piece.style.animationDelay = delay + 's';

        layer.appendChild(piece);

        setTimeout(() => piece.remove(), (duration + delay) * 1000 + 200);
      }
    })();
  </script>

</body>
</html>
