<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merch — ANKUR</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --accent: #3B82F6;
    --accent-light: #93C5FD;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.5;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  img, svg {
    max-width: 100%;
    display: block;
  }

  /* ---------- Sticky Nav ---------- */
  header.nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid #eee;
  }

  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .nav-logo {
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.05em;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    position: relative;
    padding-bottom: 4px;
    transition: color 0.2s ease;
  }

  .nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.25s ease;
  }

  .nav-links a:hover {
    color: var(--accent);
  }

  .nav-links a:hover::after {
    width: 100%;
  }

  .nav-links a.active {
    color: var(--accent);
  }

  .nav-links a.active::after {
    width: 100%;
  }

  .nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }

  .nav-toggle span {
    width: 24px;
    height: 2px;
    background: var(--text);
    display: block;
  }

  /* ---------- Page header ---------- */
  .page-header {
    max-width: 1200px;
    margin: 0 auto;
    padding: 64px 24px 40px;
  }

  .section-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .page-title {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }

  /* ---------- Product Grid ---------- */
  .product-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 100px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
  }

  .product-card {
    border: 1px solid #eee;
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }

  .product-card:hover {
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    transform: scale(1.02);
  }

  .product-img-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
  }

  .product-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: linear-gradient(135deg, #f2f2f2, #e2e2e2);
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    display: block;
    cursor: pointer;
    transition: transform 0.4s ease;
  }

  .product-card:hover .product-img {
    transform: scale(1.05);
  }

  .product-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 2;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .product-badge.accent {
    background: var(--accent);
    color: #fff;
  }

  .product-badge.dark {
    background: #1A1A1A;
    color: #fff;
  }

  .product-info h3 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .product-price {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .product-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .size-select {
    flex: 1 1 120px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #fff;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s ease;
  }

  .size-select:focus {
    border-color: var(--accent);
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    padding: 12px 24px;
    border-radius: 999px;
    border: 2px solid var(--accent);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, color 0.2s ease;
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    white-space: nowrap;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
    background: #2f6fe0;
  }

  .btn-primary svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    stroke: currentColor;
  }

  .buy-now-btn {
    flex: 1 1 140px;
    background: transparent;
    color: var(--accent);
    box-shadow: none;
  }

  .product-card:hover .buy-now-btn {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
  }

  /* ---------- Quick View Modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .quick-view {
    background: #fff;
    border-radius: 20px;
    max-width: 760px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    position: relative;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    transform: scale(0.94) translateY(12px);
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .modal-overlay.open .quick-view {
    transform: scale(1) translateY(0);
    opacity: 1;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #fff;
    border: none;
    font-size: 22px;
    line-height: 1;
    color: #999;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 50%;
    z-index: 2;
    transition: color 0.2s ease;
  }

  .modal-close:hover {
    color: var(--text);
  }

  .modal-image {
    flex: 0 0 320px;
    align-self: stretch;
    background: linear-gradient(135deg, #f2f2f2, #e2e2e2);
    border-right: 1px solid #eee;
  }

  .modal-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .modal-info {
    flex: 1;
    min-width: 0;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
  }

  .modal-name {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .modal-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .modal-price {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 28px;
  }

  .modal-controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: auto;
  }

  .modal-size-select {
    width: 100%;
    flex: none;
  }

  .modal-buy-btn {
    width: 100%;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 720px) {
    .nav-links {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      flex-direction: column;
      gap: 0;
      max-height: 0;
      overflow: hidden;
      border-bottom: 1px solid #eee;
      transition: max-height 0.3s ease;
    }

    .nav-links.open {
      max-height: 300px;
    }

    .nav-links li {
      padding: 16px 24px;
      border-top: 1px solid #f0f0f0;
    }

    .nav-toggle {
      display: flex;
    }

    .product-grid {
      grid-template-columns: 1fr;
    }

    .quick-view {
      flex-direction: column;
      max-height: 92vh;
    }

    .modal-image {
      flex: 0 0 auto;
      aspect-ratio: 1 / 1;
      border-right: none;
      border-bottom: 1px solid #eee;
    }

    .modal-info {
      padding: 28px 24px 32px;
    }
  }
</style>
</head>
<body>

  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">ANKUR</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="music.html">Music</a></li>
        <li><a href="merch.html" class="active">Merch</a></li>
        <li><a href="tour.html">Tour</a></li>
      </ul>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="section-label">Store</div>
      <h1 class="page-title">Merch</h1>
    </section>

    <section class="product-grid" id="productGrid"></section>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="quick-view" id="quickView" role="dialog" aria-modal="true" aria-label="Quick view">
      <button class="modal-close" id="modalClose" aria-label="Close quick view">&times;</button>
      <div class="modal-image" id="modalImage"><img id="modalImg" src="" alt=""></div>
      <div class="modal-info">
        <h2 class="modal-name" id="modalName"></h2>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-controls" id="modalControls">
          <select class="size-select modal-size-select" id="modalSizeSelect"></select>
          <a class="btn-primary modal-buy-btn" id="modalBuyBtn" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PRODUCTS = [
      {
        id: 'tshirt',
        name: 'Album T-Shirt',
        price: 35,
        sizes: ['S', 'M', 'L', 'XL'],
        link: 'https://buy.stripe.com/test_bJeaEZ1mxcrw7Knfwx5ZC00',
        badge: null,
        image: 'images/tshirt.jpg',
        description: 'A soft, heavyweight cotton tee featuring the official album artwork. Pre-shrunk and built to hold its shape wash after wash — a staple for every fan.'
      },
      {
        id: 'hoodie',
        name: 'Debut Hoodie',
        price: 65,
        sizes: ['S', 'M', 'L', 'XL'],
        link: 'https://buy.stripe.com/test_9B614paX78bg3u7ckl5ZC01',
        badge: { text: 'Best Seller', type: 'accent' },
        image: 'images/hoodie.jpg',
        description: 'The fan-favorite fleece hoodie, embroidered with the debut album logo. Brushed interior, ribbed cuffs, and a relaxed fit for everyday wear.'
      },
      {
        id: 'vinyl',
        name: 'Limited Vinyl',
        price: 30,
        sizes: null,
        link: 'https://buy.stripe.com/test_cNidRb1mx77cd4Hfwx5ZC02',
        badge: { text: 'Limited', type: 'dark' },
        image: 'images/vinyl.jpg',
        description: 'A limited-run 12" vinyl pressing of the debut album, featuring exclusive gatefold artwork. Once this run sells out, it will not be repressed.'
      },
      {
        id: 'poster',
        name: 'Album Art Poster',
        price: 20,
        sizes: null,
        link: 'https://buy.stripe.com/test_bJe3cxfdndvA0hVdop5ZC03',
        badge: null,
        image: 'images/poster.jpg',
        description: 'A museum-quality print of the official album artwork on heavyweight matte paper. Ships flat in a protective sleeve, ready to frame.'
      },
      {
        id: 'hat',
        name: 'Classic Dad Hat',
        price: 25,
        sizes: ['One Size'],
        link: 'https://buy.stripe.com/test_5kQfZj3uFgHMggT1FH5ZC04',
        badge: null,
        image: 'images/hat.jpg',
        description: 'A low-profile, adjustable dad hat with the embroidered logo on the front panel. Curved brim, unstructured crown, one size fits most.'
      }
    ];

    const LOCK_ICON = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="10" rx="2"></rect>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
      </svg>
    `;

    const productGrid = document.getElementById('productGrid');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalImg = document.getElementById('modalImg');
    const modalName = document.getElementById('modalName');
    const modalDesc = document.getElementById('modalDesc');
    const modalPrice = document.getElementById('modalPrice');
    const modalSizeSelect = document.getElementById('modalSizeSelect');
    const modalBuyBtn = document.getElementById('modalBuyBtn');

    function formatPrice(n) {
      return 'AED ' + n.toFixed(2);
    }

    function renderProducts() {
      productGrid.innerHTML = PRODUCTS.map(p => {
        const sizeSelect = p.sizes
          ? `<select class="size-select" id="size-${p.id}">
              ${p.sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
            </select>`
          : '';
        const badge = p.badge
          ? `<span class="product-badge ${p.badge.type}">${p.badge.text}</span>`
          : '';
        return `
          <div class="product-card">
            <div class="product-img-wrap" data-id="${p.id}">
              ${badge}
              <img class="product-img" src="${p.image}" alt="${p.name}">
            </div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <div class="product-price">${formatPrice(p.price)}</div>
            </div>
            <div class="product-controls">
              ${sizeSelect}
              <a class="btn-primary buy-now-btn" href="${p.link}" target="_blank" rel="noopener noreferrer">
                ${LOCK_ICON}
                Buy Now
              </a>
            </div>
          </div>
        `;
      }).join('');

      productGrid.querySelectorAll('.product-img-wrap').forEach(wrap => {
        wrap.addEventListener('click', () => {
          openQuickView(wrap.getAttribute('data-id'));
        });
      });
    }

    function openQuickView(id) {
      const p = PRODUCTS.find(item => item.id === id);
      if (!p) return;

      modalImg.src = p.image;
      modalImg.alt = p.name;
      modalName.textContent = p.name;
      modalDesc.textContent = p.description;
      modalPrice.textContent = formatPrice(p.price);

      if (p.sizes) {
        modalSizeSelect.innerHTML = p.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
        modalSizeSelect.style.display = '';
      } else {
        modalSizeSelect.innerHTML = '';
        modalSizeSelect.style.display = 'none';
      }

      modalBuyBtn.href = p.link;
      modalBuyBtn.innerHTML = `${LOCK_ICON}Buy Now`;

      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeQuickView() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeQuickView);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeQuickView();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeQuickView();
    });

    // Mobile nav toggle
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', isOpen);
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });

    renderProducts();
  </script>

</body>
</html>
